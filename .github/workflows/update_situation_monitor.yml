name: Update Situation Monitor
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install feedparser
        run: pip install feedparser
      - name: Aggregate public RSS feeds
        run: python scripts/aggregate_situation_feed.py
      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add static/situation-monitor/feed.json
          git diff --staged --quiet || git commit -m "Update situation monitor feed"
          git push
