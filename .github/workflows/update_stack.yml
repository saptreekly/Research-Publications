name: Update Stack Audit
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install requests
        run: pip install requests
      - name: Run audit
        run: mkdir -p static && python scripts/audit_stack.py
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add static/stack.json
          git commit -m "Automated update: stack.json"
          git push
